<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders | SuperMart</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/dark-mode.css">
<link rel="stylesheet" href="../assets/css/features.css">
<style>
.order-detail-modal .modal-header{background:#e92424;color:#fff;border-radius:12px 12px 0 0;}
.order-detail-modal .modal-header .btn-close{filter:invert(1);}
.order-detail-modal .modal-content{border-radius:14px;border:none;box-shadow:0 20px 60px rgba(0,0,0,.15);}

/* Tracking timeline */
.trk-row{display:flex;gap:0;margin:20px 0;}
.trk-step{flex:1;text-align:center;position:relative;}
.trk-step:not(:last-child)::after{content:'';position:absolute;top:16px;left:50%;width:100%;height:3px;background:#e8ecf0;z-index:0;}
.trk-step.done:not(:last-child)::after{background:#e92424;}
.trk-circle{width:34px;height:34px;border-radius:50%;border:3px solid #e8ecf0;background:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;position:relative;z-index:1;font-size:13px;color:#ccc;}
.trk-step.done .trk-circle{background:#e92424;border-color:#e92424;color:#fff;}
.trk-step.active .trk-circle{background:#fff;border-color:#e92424;color:#e92424;box-shadow:0 0 0 4px rgba(233,36,36,.15);}
.trk-label{font-size:11px;font-weight:700;color:#aaa;}
.trk-step.done .trk-label,.trk-step.active .trk-label{color:#333;font-weight:700;}

/* Order items */
.od-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f5f7fa;}
.od-item:last-child{border-bottom:none;}
.od-item img{width:46px;height:46px;border-radius:8px;object-fit:cover;background:#f8f9fa;}
.od-item-name{font-weight:600;font-size:14px;}
.od-item-meta{font-size:12px;color:#aaa;}

/* Summary box */
.od-summary{background:#f8f9fa;border-radius:10px;padding:14px 16px;}
.od-summary-row{display:flex;justify-content:space-between;font-size:13.5px;padding:4px 0;}
.od-summary-row.total{font-weight:700;font-size:15px;border-top:1px solid #e8ecf0;padding-top:10px;margin-top:6px;}

/* Info row */
.od-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.od-info-box{background:#f8f9fa;border-radius:10px;padding:12px 14px;}
.od-info-box h6{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#999;margin-bottom:6px;}
.od-info-box p{font-size:13px;font-weight:600;color:#333;margin:0;line-height:1.5;}
</style>
</head>
<body>
<div class="top-bar py-2"><div class="container d-flex justify-content-between align-items-center">
<span><i class="fa-regular fa-clock"></i> Mon - Sun : 8:00 AM - 10:00 PM</span>
<a href="store-locator.html"><i class="fa-solid fa-location-dot"></i> Find a Store</a>
</div></div>
<nav class="navbar navbar-expand-lg shadow-sm sticky-top"><div class="container">
<a class="navbar-brand fw-bold logo" href="index.html">SuperMart</a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"><span class="navbar-toggler-icon"></span></button>
<div class="collapse navbar-collapse" id="navMenu">
<ul class="navbar-nav ms-auto align-items-lg-center">
<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="offers.html">Offers</a></li>
</ul>
<div class="d-flex align-items-center gap-2 ms-lg-3">
<a href="cart.html" class="nav-icon-btn"><i class="fa-solid fa-cart-shopping"></i><span class="cart-badge" id="cartCountNav">0</span></a>
<button id="themeToggle" class="btn btn-danger" aria-label="Toggle dark mode"><i class="fa-solid fa-moon"></i></button>
</div>
</div></div></nav>

<main class="dashboard-section">
<div class="container">
<div class="row g-4">
<div class="col-lg-3">
<div class="dash-sidebar">
<div class="dash-user-info">
<img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=80&h=80&fit=crop&crop=face" alt="Profile" id="profileAvatar">
<h5 id="dashName">User</h5>
<small id="dashEmail">user@email.com</small>
</div>
<ul class="dash-nav">
<li><a href="profile.html"><i class="fa-solid fa-user"></i> My Profile</a></li>
<li><a href="orders.html" class="active"><i class="fa-solid fa-bag-shopping"></i> My Orders</a></li>
<li><a href="wishlist.html"><i class="fa-solid fa-heart"></i> My Wishlist</a></li>
<li><a href="cart.html"><i class="fa-solid fa-cart-shopping"></i> My Cart</a></li>
<li><a href="#" onclick="handleLogout(event)" class="logout-link"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
</ul>
</div>
</div>
<div class="col-lg-9">
<div class="dash-content">
<h4 class="mb-4"><i class="fa-solid fa-bag-shopping me-2 text-danger"></i>My Orders</h4>
<!-- Filter -->
<div class="d-flex gap-2 mb-4 flex-wrap">
<button class="btn btn-danger btn-sm filter-order active" data-filter="all">All</button>
<button class="btn btn-outline-danger btn-sm filter-order" data-filter="Processing">Processing</button>
<button class="btn btn-outline-danger btn-sm filter-order" data-filter="Shipped">Shipped</button>
<button class="btn btn-outline-danger btn-sm filter-order" data-filter="Delivered">Delivered</button>
<button class="btn btn-outline-danger btn-sm filter-order" data-filter="Cancelled">Cancelled</button>
</div>
<div id="ordersList"></div>
</div>
</div>
</div>
</div>
</main>

<!-- ── Order Detail Modal ── -->
<div class="modal fade order-detail-modal" id="orderDetailModal" tabindex="-1">
<div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
<div class="modal-content">
<div class="modal-header">
  <div>
    <h5 class="modal-title fw-bold mb-0" id="modalOrderId">#SM-20240001</h5>
    <div style="font-size:12px;opacity:.85;" id="modalOrderDate">Jun 20, 2026</div>
  </div>
  <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body p-4">

  <!-- Status + Tracking -->
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div><span class="fw-bold" style="font-size:13px;color:#555;">Order Status:</span> <span id="modalStatusBadge"></span></div>
    <div style="font-size:12px;color:#aaa;" id="modalETA"></div>
  </div>

  <!-- Tracking Steps -->
  <div class="trk-row" id="modalTracking"></div>

  <hr>

  <!-- Info grid -->
  <div class="od-info-grid" id="modalInfoGrid"></div>

  <!-- Items -->
  <h6 class="fw-bold mb-2" style="font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:#999;">Items Ordered</h6>
  <div id="modalItems" class="mb-3"></div>

  <!-- Summary -->
  <div class="od-summary" id="modalSummary"></div>
</div>
<div class="modal-footer border-0">
  <button class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Close</button>
  <a href="offers.html" class="btn btn-danger btn-sm"><i class="fa-solid fa-cart-shopping me-1"></i>Shop Again</a>
</div>
</div>
</div>
</div>

<div class="sm-toast" id="smToast"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/products-data.js"></script>
<script src="../assets/js/features.js"></script>
<script>
/* ── Demo orders (fallback when no real orders exist) ── */
const DEMO_ORDERS=[
  {
    id:'SM-20240001',date:'Jun 20, 2026',status:'Delivered',step:5,
    items:[{name:'Fresh Apples',qty:2,price:108,img:'../assets/images/product-fresh-apples.png'},{name:'Fresh Milk (1L)',qty:1,price:60,img:'../assets/images/product-fresh-milk.png'},{name:'Whole Wheat Bread',qty:1,price:42,img:'../assets/images/product-whole-wheat-bread.png'}],
    address:'12, Anna Nagar, Chennai – 600040, Tamil Nadu',pay:'UPI',delivery:40
  },
  {
    id:'SM-20240002',date:'Jun 18, 2026',status:'Delivered',step:5,
    items:[{name:'Potato Chips',qty:2,price:25,img:'../assets/images/product-potato-chips.png'},{name:'Orange Juice (1L)',qty:2,price:96,img:'../assets/images/product-orange-juice.png'}],
    address:'12, Anna Nagar, Chennai – 600040, Tamil Nadu',pay:'Credit Card',delivery:0
  },
  {
    id:'SM-20240003',date:'Jun 25, 2026',status:'Shipped',step:3,
    items:[{name:'Cheddar Cheese',qty:1,price:176,img:'../assets/images/product-cheddar-cheese.png'},{name:'Butter Croissants',qty:2,price:58,img:'../assets/images/product-butter-croissants.png'}],
    address:'12, Anna Nagar, Chennai – 600040, Tamil Nadu',pay:'Net Banking',delivery:40
  },
  {
    id:'SM-20240004',date:'Jun 27, 2026',status:'Processing',step:2,
    items:[{name:'Bananas',qty:3,price:51,img:'../assets/images/product-bananas.png'},{name:'Cheddar Cheese',qty:1,price:176,img:'../assets/images/product-cheddar-cheese.png'}],
    address:'12, Anna Nagar, Chennai – 600040, Tamil Nadu',pay:'Cash on Delivery',delivery:40
  },
  {
    id:'SM-20240005',date:'Jun 10, 2026',status:'Delivered',step:5,
    items:[{name:'Whole Wheat Bread',qty:2,price:42,img:'../assets/images/product-whole-wheat-bread.png'}],
    address:'12, Anna Nagar, Chennai – 600040, Tamil Nadu',pay:'UPI',delivery:0
  },
  {
    id:'SM-20240006',date:'Jun 05, 2026',status:'Cancelled',step:0,
    items:[{name:'Potato Chips',qty:1,price:25,img:'../assets/images/product-potato-chips.png'},{name:'Orange Juice (1L)',qty:3,price:96,img:'../assets/images/product-orange-juice.png'}],
    address:'12, Anna Nagar, Chennai – 600040, Tamil Nadu',pay:'Credit Card',delivery:40
  },
];

/* ── Merge with real orders placed via checkout ── */
function getMyOrders(){
  const real=JSON.parse(localStorage.getItem('smOrders')||'[]');
  // Convert real checkout orders to our format
  const converted=real.map(o=>({
    id:o.id||('SM-'+Date.now()),
    date:o.date||new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}),
    status:o.status||'Processing',
    step:o.step||2,
    items:(o.items||o.cart||[]).map(i=>({
      name:i.name,qty:i.qty||i.quantity||1,price:i.price,
      img:i.img||i.image||'../assets/images/product-fresh-apples.png'
    })),
    address:o.address||o.deliveryAddress||'Address on file',
    pay:o.pay||o.payment||'Online',
    delivery:o.deliveryFee||o.delivery||40
  }));
  // Real orders first, then demo orders for sample
  return converted.length>0?converted:[...DEMO_ORDERS];
}

let ALL_ORDERS=getMyOrders();

/* ── Tracking steps ── */
const TRK=[
  {icon:'fa-circle-check',label:'Placed'},
  {icon:'fa-box-open',label:'Processing'},
  {icon:'fa-truck',label:'Shipped'},
  {icon:'fa-motorcycle',label:'Out for Delivery'},
  {icon:'fa-house-chimney-check',label:'Delivered'},
];

const STATUS_COLORS={
  'Placed':'#2563eb','Processing':'#d97706','Shipped':'#16a34a',
  'Out for Delivery':'#9333ea','Delivered':'#15803d','Cancelled':'#dc2626'
};

function statusBadgeHtml(status){
  const c=STATUS_COLORS[status]||'#555';
  return`<span style="background:${c}22;color:${c};padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;">${status}</span>`;
}

/* ── Render order list ── */
function renderOrders(filter='all'){
  const list=document.getElementById('ordersList');
  const filtered=filter==='all'?ALL_ORDERS:ALL_ORDERS.filter(o=>o.status===filter);
  if(filtered.length===0){list.innerHTML='<p class="text-muted text-center py-4">No orders found.</p>';return;}
  list.innerHTML=filtered.map(o=>{
    const subtotal=(o.items||[]).reduce((s,i)=>s+(i.price*(i.qty||1)),0);
    const total=subtotal+(o.delivery||0);
    const itemSummary=(o.items||[]).map(i=>i.name+(i.qty>1?` x${i.qty}`:'')).join(', ');
    return`<div class="order-row">
    <div>
      <div class="order-id">#${o.id}</div>
      <div class="order-date">${o.date}</div>
      <div class="text-muted" style="font-size:13px;">${itemSummary}</div>
    </div>
    <div class="text-end">
      <div class="fw-bold text-danger">₹${total}</div>
      ${statusBadgeHtml(o.status)}
      <div class="mt-2"><button class="btn btn-outline-danger btn-sm" onclick="openDetail('${o.id}')"><i class="fa-solid fa-eye me-1"></i>View Details</button></div>
    </div>
  </div>`;
  }).join('');
}

/* ── Open order detail modal ── */
function openDetail(id){
  const o=ALL_ORDERS.find(x=>x.id===id);
  if(!o)return;

  document.getElementById('modalOrderId').textContent='#'+o.id;
  document.getElementById('modalOrderDate').textContent='Placed on '+o.date;
  document.getElementById('modalStatusBadge').innerHTML=statusBadgeHtml(o.status);

  // ETA
  const etaMap={'Placed':'Estimated delivery in 3-5 days','Processing':'Estimated delivery in 2-4 days','Shipped':'Expected to arrive in 1-2 days','Out for Delivery':'Arriving today!','Delivered':'','Cancelled':'Order was cancelled'};
  document.getElementById('modalETA').textContent=etaMap[o.status]||'';

  // Tracking
  const cancelled=o.status==='Cancelled';
  document.getElementById('modalTracking').innerHTML=cancelled
    ?`<div class="text-center py-2 w-100"><span style="background:#fef2f2;color:#dc2626;padding:6px 18px;border-radius:20px;font-size:13px;font-weight:700;"><i class="fa-solid fa-xmark me-1"></i>Order Cancelled</span></div>`
    :TRK.map((s,i)=>{
        const done=o.step>i,active=o.step===i+1;
        return`<div class="trk-step ${done?'done':''} ${active?'active':''}">
          <div class="trk-circle"><i class="fa-solid ${s.icon}"></i></div>
          <div class="trk-label">${s.label}</div>
        </div>`;
      }).join('');

  // Info grid
  document.getElementById('modalInfoGrid').innerHTML=`
    <div class="od-info-box"><h6><i class="fa-solid fa-location-dot me-1"></i>Delivery Address</h6><p>${o.address||'Not provided'}</p></div>
    <div class="od-info-box"><h6><i class="fa-solid fa-wallet me-1"></i>Payment Method</h6><p>${o.pay||'Online'}<br><span style="font-size:11px;color:#22c55e;font-weight:600;"><i class="fa-solid fa-circle-check me-1"></i>Payment Confirmed</span></p></div>
  `;

  // Items
  const items=o.items||[];
  document.getElementById('modalItems').innerHTML=items.map(i=>`
    <div class="od-item">
      <img src="${i.img||'../assets/images/product-fresh-apples.png'}" onerror="this.src='https://images.unsplash.com/photo-1542838132-92c53300491e?w=46&h=46&fit=crop'" alt="${i.name}">
      <div class="flex-grow-1">
        <div class="od-item-name">${i.name}</div>
        <div class="od-item-meta">Qty: ${i.qty||1} × ₹${i.price}</div>
      </div>
      <div class="fw-bold">₹${(i.price*(i.qty||1))}</div>
    </div>`).join('');

  // Summary
  const subtotal=items.reduce((s,i)=>s+(i.price*(i.qty||1)),0);
  const delivery=o.delivery||0;
  document.getElementById('modalSummary').innerHTML=`
    <div class="od-summary-row"><span>Subtotal</span><span>₹${subtotal}</span></div>
    <div class="od-summary-row"><span>Delivery Fee</span><span>${delivery===0?'<span style="color:#22c55e;font-weight:700;">FREE</span>':'₹'+delivery}</span></div>
    <div class="od-summary-row total"><span>Total Paid</span><span class="text-danger">₹${subtotal+delivery}</span></div>
  `;

  new bootstrap.Modal(document.getElementById('orderDetailModal')).show();
}

/* ── Filter buttons ── */
document.querySelectorAll('.filter-order').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.filter-order').forEach(b=>{b.classList.remove('btn-danger','active');b.classList.add('btn-outline-danger');});
    this.classList.remove('btn-outline-danger');this.classList.add('btn-danger','active');
    renderOrders(this.dataset.filter);
  });
});

/* ── Auth (soft — no hard redirect so guests can view their orders too) ── */
const user=JSON.parse(localStorage.getItem('smUser')||'{}');
document.getElementById('dashName').textContent=user.name||'Guest';
document.getElementById('dashEmail').textContent=user.email||'';
function handleLogout(e){e.preventDefault();localStorage.removeItem('smUser');window.location.href='index.html';}

renderOrders();
</script>
</body>
</html>
