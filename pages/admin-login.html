<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login | SuperMart</title>
<meta name="robots" content="noindex">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/dark-mode.css">
<link rel="stylesheet" href="../assets/css/features.css">
<link rel="stylesheet" href="../assets/css/enhance.css">

<style>
body{background:#1c1f26;}
.admin-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 0;}
.admin-card{max-width:400px;width:100%;background:#fff;border-radius:18px;box-shadow:0 10px 35px rgba(0,0,0,.3);padding:40px 34px;}
.admin-card .icon-badge{width:60px;height:60px;border-radius:50%;background:#e9242433;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:#e92424;font-size:24px;}
.admin-card h1{font-size:1.4rem;text-align:center;margin-bottom:4px;}
.admin-card .sub{text-align:center;color:#888;margin-bottom:24px;font-size:14px;}
.admin-card .form-control{height:46px;border-radius:10px;}
.admin-card .btn-dark{height:46px;border-radius:10px;font-weight:700;width:100%;}
.demo-hint{background:#f5f5f5;border-radius:10px;padding:10px 14px;font-size:13px;color:#777;margin-top:18px;}
.back-home{display:block;text-align:center;margin-top:16px;color:#aaa;font-size:13px;}
</style>
</head>
<body>

<div class="admin-wrap">
<div class="admin-card">
<div class="icon-badge"><i class="fa-solid fa-user-shield"></i></div>
<h1>SuperMart Admin</h1>
<p class="sub">Sign in to manage products, offers &amp; orders.</p>

<form id="adminLoginForm" novalidate>
<div class="mb-3">
<label class="form-label" for="adminUser">Admin Username</label>
<input type="text" class="form-control" id="adminUser" required placeholder="admin">
</div>
<div class="mb-3">
<label class="form-label" for="adminPass">Password</label>
<input type="password" class="form-control" id="adminPass" required placeholder="Enter admin password">
</div>
<button type="submit" class="btn btn-dark">Login to Dashboard</button>
</form>

<div class="demo-hint"><i class="fa-solid fa-circle-info me-1"></i>Demo credentials &mdash; Username: <strong>admin</strong> &nbsp;Password: <strong>admin123</strong></div>
<a href="index.html" class="back-home"><i class="fa-solid fa-arrow-left me-1"></i>Back to SuperMart</a>
</div>
</div>

<div class="sm-toast" id="smToast"></div>

<script src="../assets/js/features.js"></script>
<script>
document.getElementById('adminLoginForm').addEventListener('submit', function(e){
  e.preventDefault();
  const u = document.getElementById('adminUser').value.trim();
  const p = document.getElementById('adminPass').value.trim();
  if(u === 'admin' && p === 'admin123'){
    localStorage.setItem('smAdmin', 'true');
    showToast('Welcome back, Admin!','success');
    setTimeout(()=>{ window.location.href = 'admin-dashboard.html'; }, 700);
  } else {
    showToast('Invalid admin username or password.','error');
  }
});
</script>

</body>
</html>
